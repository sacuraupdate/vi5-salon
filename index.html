<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vi5 — 予約 & 管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,400&family=Hanken+Grotesk:wght@400;500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--paper:#F5F1E8;--paper-2:#ECE6D8;--navy:#1E2A47;--ink:#212838;--ink-soft:#6B6E79;--line:#DDD6C6;--gold:#B0894A;--gold-soft:#C9A765;--gold-bg:#F6EFDD;--card:#FCFAF4;--sage:#5F7355;--rose:#9C5B6B;--shadow:rgba(30,42,71,.13);}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Hanken Grotesk","Zen Kaku Gothic New",sans-serif;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;background-image:radial-gradient(circle at 12% 8%,rgba(176,137,74,.10),transparent 42%),radial-gradient(circle at 92% 92%,rgba(30,42,71,.07),transparent 46%);min-height:100vh;}
.wrap{max-width:760px;margin:0 auto;padding:0 18px 90px;}
header{padding:26px 0 8px;text-align:center;position:relative;}
.brand{font-family:"Fraunces",serif;font-weight:600;font-size:30px;letter-spacing:.06em;color:var(--navy);}
.brand .dot{color:var(--gold)}
.rankgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:6px}
.rankcard{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;text-align:center;position:relative}
.rankmedal{position:absolute;top:6px;left:6px;font-size:20px;z-index:2;filter:drop-shadow(0 1px 2px rgba(0,0,0,.3))}
.rankimg{width:100%;aspect-ratio:1/1;background-size:cover;background-position:center;background-color:#EFEAE0}
.rankname{padding:8px 6px;font-size:12px;font-weight:600;color:var(--navy);line-height:1.3;min-height:34px;display:flex;align-items:center;justify-content:center}
.calhas{cursor:pointer}
.calbadge{position:absolute;top:3px;right:3px;background:var(--gold);color:#fff;font-size:10px;font-weight:700;min-width:16px;height:16px;line-height:16px;border-radius:8px;padding:0 3px}
.calrow{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:8px}
.calt{font-weight:700;color:var(--navy);font-size:15px;white-space:nowrap;display:flex;flex-direction:column;line-height:1.1}
.calt small{font-size:10px;font-weight:500;color:var(--ink-soft)}
.calinfo{flex:1;display:flex;flex-direction:column;gap:2px;min-width:0}
.calinfo b{font-size:13px;color:var(--navy)}
.calinfo span{font-size:11px;color:var(--ink-soft)}
.mapembed{width:100%;height:200px;border:0;border-radius:14px;display:block}
.guide{background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:14px}
.guide summary{font-weight:700;color:var(--navy);font-size:13px;cursor:pointer;list-style:none}
.guide summary::-webkit-details-marker{display:none}
.guidegrid{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.guidegrid>div{display:flex;align-items:center;gap:10px;font-size:12.5px;color:var(--ink)}
.gi{flex-shrink:0;width:30px;height:30px;display:grid;place-items:center;border:1px solid var(--line);border-radius:8px;font-size:14px;background:var(--paper)}
.gi-ok{color:#fff;background:var(--sage);border-color:var(--sage);font-weight:800}
.gi-x{color:#fff;background:var(--rose);border-color:var(--rose);font-weight:800}
.tagline{font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);margin-top:7px;font-weight:600;}
.langsel{position:absolute;top:24px;left:0;font-family:inherit;font-size:11.5px;font-weight:600;color:var(--navy);background:var(--card);border:1px solid var(--line);border-radius:100px;padding:7px 9px;cursor:pointer;max-width:108px}
.acct{position:absolute;top:22px;right:0;display:inline-flex;align-items:center;gap:6px;background:var(--navy);color:#fff;border:none;font-family:inherit;font-size:12px;font-weight:600;padding:8px 13px 8px 11px;border-radius:100px;cursor:pointer;box-shadow:0 4px 14px var(--shadow)}
.acct svg{width:16px;height:16px}
.acctcol{display:flex;flex-direction:column;align-items:flex-start;line-height:1.15}
.acctpts{font-size:9.5px;font-weight:700;opacity:.85}
.acct.active{background:var(--gold)}
.acctbadge{display:inline-grid!important;place-items:center;min-width:17px;height:17px;background:var(--rose);color:#fff;border-radius:100px;font-size:10px;font-weight:700;padding:0 4px;margin-left:1px}
.nav{display:flex;gap:5px;overflow-x:auto;padding:5px;background:var(--paper-2);border:1px solid var(--line);border-radius:14px;margin:18px auto 24px;max-width:560px;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav button{flex:0 0 auto;border:none;background:none;font-family:inherit;font-size:12.5px;font-weight:600;padding:9px 15px;border-radius:10px;cursor:pointer;color:var(--ink-soft);white-space:nowrap;transition:all .2s}
.nav button.active{background:var(--navy);color:var(--paper)}
.steps{display:flex;justify-content:center;gap:6px;margin-bottom:22px;}
.steps .s{height:3px;width:42px;border-radius:3px;background:var(--line);transition:background .4s;}.steps .s.on{background:var(--gold)}
.eyebrow{font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.h-title{font-family:"Fraunces",serif;font-size:24px;font-weight:500;line-height:1.2;color:var(--navy);}
.h-sub{font-size:13.5px;color:var(--ink-soft);margin:5px 0 20px;}
.backlink{display:inline-flex;align-items:center;gap:6px;background:none;border:none;font-family:inherit;font-size:13px;font-weight:600;color:var(--navy);cursor:pointer;padding:0;margin-bottom:16px;}
.backlink:hover{color:var(--gold)}
.btn{font-family:inherit;font-size:15px;font-weight:600;padding:15px 22px;border-radius:13px;border:none;cursor:pointer;transition:all .25s}
.btn-primary{background:var(--navy);color:var(--paper);flex:1}.btn-primary:hover:not(:disabled){background:var(--gold)}.btn-primary:disabled{opacity:.32;cursor:not-allowed}
.btn-ghost{flex:0 0 auto;background:transparent;border:1px solid var(--line);color:var(--navy)}.btn-ghost:hover{border-color:var(--navy)}
.hero-home{background:var(--navy);border-radius:22px;padding:30px 26px;color:var(--paper);position:relative;overflow:hidden;margin-bottom:22px;animation:rise .5s both}
.hero-home::after{content:"";position:absolute;right:-40px;top:-40px;width:170px;height:170px;border-radius:50%;background:rgba(176,137,74,.18)}
.hero-home .hh-tag{font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--gold-soft);font-weight:600}
.hero-home h2{font-family:"Fraunces",serif;font-size:26px;font-weight:500;margin:8px 0 6px;line-height:1.3}
.hero-home p{font-size:13px;opacity:.85;line-height:1.7;margin-bottom:20px;max-width:92%}
.hero-home .btn{background:var(--gold);color:var(--navy);display:inline-block;padding:13px 26px;border-radius:100px}.hero-home .btn:hover{background:#fff}
.sec-label{display:flex;align-items:center;justify-content:space-between;margin:26px 0 14px}
.sec-label .t{font-family:"Fraunces",serif;font-size:19px;color:var(--navy)}.sec-label .more{font-size:12px;font-weight:600;color:var(--gold);background:none;border:none;cursor:pointer}
.camp{border:1px solid var(--gold-soft);background:var(--gold-bg);border-radius:18px;padding:18px 20px;margin-bottom:12px;animation:rise .5s both}
.camp .ribbon{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.1em;background:var(--rose);color:#fff;padding:3px 10px;border-radius:100px;margin-bottom:9px}
.camp h3{font-family:"Fraunces",serif;font-size:18px;color:var(--navy);margin-bottom:6px}.camp p{font-size:13px;color:var(--ink-soft);line-height:1.6}
.linkgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.linkbtn{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;font-weight:600;font-size:13.5px;color:var(--navy);cursor:pointer;text-decoration:none;transition:all .2s}
.linkbtn:hover{border-color:var(--gold);transform:translateY(-2px)}.linkbtn .ic{font-size:18px}
.addr{font-size:12px;color:var(--ink-soft);line-height:1.7;margin-top:14px;text-align:center}
.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.gfilter{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.gfilter button{border:1px solid var(--line);background:var(--card);font-family:inherit;font-size:12.5px;font-weight:600;padding:8px 16px;border-radius:100px;cursor:pointer;color:var(--ink-soft)}
.gfilter button.active{background:var(--navy);color:var(--paper);border-color:var(--navy)}
.post{background:var(--card);border:1px solid var(--line);border-radius:18px;overflow:hidden;margin-bottom:14px;animation:rise .45s both}
.post-img{height:230px;background-size:cover;background-position:center;position:relative}
.feat .post-img{height:130px}
.post-save{position:absolute;top:11px;right:11px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.92);display:grid;place-items:center;cursor:pointer;border:none;transition:all .2s}
.post-save:hover{transform:scale(1.08)}.post-save svg{width:20px;height:20px;stroke:var(--rose);fill:none;stroke-width:2}
.post-save.on{background:var(--rose)}.post-save.on svg{fill:#fff;stroke:#fff}
.post-kindtag{position:absolute;left:11px;top:11px;font-size:10px;font-weight:700;background:rgba(30,42,71,.78);color:#fff;padding:4px 10px;border-radius:100px}
.post-body{padding:14px 16px}.post-caption{font-size:13.5px;color:var(--ink);line-height:1.7}
.post-foot{display:flex;align-items:center;gap:10px;margin-top:13px}.post-menu{margin-left:auto}
.post-menu button{font-family:inherit;font-size:12.5px;font-weight:600;border:1px solid var(--gold-soft);background:var(--gold-bg);color:var(--gold);padding:9px 14px;border-radius:11px;cursor:pointer}.post-menu button:hover{background:var(--gold);color:#fff}
.feat .post-body{padding:10px 12px}.feat .post-caption{font-size:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.cat-card{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;cursor:pointer;transition:all .25s;animation:rise .5s both;}
.cat-card:hover{transform:translateY(-3px);box-shadow:0 14px 32px var(--shadow);border-color:var(--gold);}
.cat-photo{height:96px;display:grid;place-items:center;position:relative;background-size:cover;background-position:center;}
.cat-photo .ph-mono{font-family:"Fraunces",serif;font-size:28px;color:var(--paper);opacity:.92}.cat-photo .ph-tag{position:absolute;left:10px;bottom:8px;font-size:9px;letter-spacing:.08em;color:rgba(255,255,255,.75)}
.cat-body{padding:12px 14px;display:flex;align-items:center;gap:8px}.cat-name{font-weight:600;font-size:14px;color:var(--navy)}.cat-count{font-size:11px;color:var(--ink-soft);margin-top:2px}.cat-body .chev{margin-left:auto;color:var(--gold);flex-shrink:0}
.menu-item{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:12px 13px;margin-bottom:10px;transition:all .25s;animation:rise .45s both;}
.mi-row{display:flex;align-items:center;gap:12px;cursor:pointer}
.mi-more{font-size:10.5px;color:var(--gold);font-weight:600;margin-left:4px}
.mi-detail{margin-top:11px;padding-top:11px;border-top:1px dashed var(--line);animation:rise .3s both}
.mi-detail-tx{font-size:12.5px;color:var(--ink-soft);line-height:1.7}
.menu-item.sel{border-color:var(--gold);background:var(--gold-bg);box-shadow:0 6px 18px var(--shadow);}
.mi-thumb{width:62px;height:62px;border-radius:12px;flex-shrink:0;background-size:cover;background-position:center}
.mi-body{flex:1;min-width:0}.mi-name{font-weight:600;font-size:14px;line-height:1.35}.mi-desc{font-size:11.5px;color:var(--gold);margin-top:3px;font-weight:500}.mi-meta{font-size:11px;color:var(--ink-soft);margin-top:3px}
.mi-price{font-family:"Fraunces",serif;font-size:16px;font-weight:500;white-space:nowrap}
.mi-add{width:34px;height:34px;border-radius:10px;border:1.5px solid var(--line);background:var(--paper);cursor:pointer;display:grid;place-items:center;flex-shrink:0;transition:all .2s;}
.mi-add:hover{border-color:var(--gold)}.mi-add svg{width:16px;height:16px;stroke:var(--navy);stroke-width:2.4}
.menu-item.sel .mi-add{background:var(--gold);border-color:var(--gold)}.menu-item.sel .mi-add svg{stroke:var(--paper)}
.fav-label{font-size:11px;letter-spacing:.1em;color:var(--gold);font-weight:700;margin-bottom:10px;text-transform:uppercase}
.opt-hint{font-size:12px;color:var(--ink-soft);background:var(--paper-2);border-radius:10px;padding:11px 14px;margin:4px 0 14px;line-height:1.6;}
.staff{display:flex;gap:15px;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:11px;cursor:pointer;transition:all .25s;animation:rise .5s both;}
.staff:hover{transform:translateY(-2px);box-shadow:0 12px 30px var(--shadow)}.staff.sel{border-color:var(--gold);background:var(--gold-bg)}
.photo{width:70px;height:70px;border-radius:16px;flex-shrink:0;overflow:hidden;display:grid;place-items:center;font-family:"Fraunces",serif;font-size:25px;color:var(--paper);font-weight:500;position:relative;background-size:cover;background-position:center;}
.staff-body{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center}
.staff-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.staff-name{font-weight:600;font-size:15.5px;color:var(--navy)}
.staff-role{font-size:11px;color:var(--gold);font-weight:600;border:1px solid var(--gold-soft);border-radius:100px;padding:2px 9px}
.staff-intro{font-size:12.5px;color:var(--ink-soft);line-height:1.6;margin-top:7px}
.staff-check{position:absolute;top:6px;right:6px;width:22px;height:22px;border-radius:50%;background:var(--gold);display:grid;place-items:center;opacity:0;transform:scale(.5);transition:all .2s}
.staff.sel .staff-check{opacity:1;transform:scale(1)}.staff-check svg{width:12px;height:12px;stroke:#fff;stroke-width:3}
.cal{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px 16px 18px;margin-bottom:8px;}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}.cal-title{font-family:"Fraunces",serif;font-size:19px;font-weight:500;color:var(--navy)}
.cal-nav{width:34px;height:34px;border-radius:10px;border:1px solid var(--line);background:var(--paper);cursor:pointer;display:grid;place-items:center;transition:all .2s}
.cal-nav:hover:not(:disabled){border-color:var(--gold)}.cal-nav:disabled{opacity:.3;cursor:not-allowed}.cal-nav svg{width:16px;height:16px;stroke:var(--navy);stroke-width:2.2}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}.cal-dow{text-align:center;font-size:11px;font-weight:600;color:var(--ink-soft);padding:4px 0}.cal-dow.sun{color:var(--gold)}
.cal-day{aspect-ratio:1;display:grid;place-items:center;border-radius:11px;font-size:14px;font-weight:600;cursor:pointer;transition:all .18s;font-variant-numeric:tabular-nums}
.cal-day:hover:not(.dis):not(.closed){background:var(--gold-bg);color:var(--gold)}.cal-day.sel{background:var(--navy);color:var(--paper)!important}
.cal-day.dis{color:var(--line);cursor:not-allowed}.cal-day.closed{color:#C7B9A0;cursor:not-allowed;text-decoration:line-through}
.cal-legend{font-size:11.5px;color:var(--ink-soft);text-align:center;margin-top:10px}
.slot-wrap{margin-top:20px}.slot-label{font-size:12.5px;font-weight:600;margin-bottom:10px}
.slots{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.slot{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px 0;text-align:center;font-weight:600;font-size:13.5px;cursor:pointer;transition:all .2s;font-variant-numeric:tabular-nums}
.slot:hover:not(.full){border-color:var(--gold);color:var(--gold)}.slot.sel{background:var(--gold);color:var(--paper);border-color:var(--gold)}.slot.full{opacity:.35;cursor:not-allowed;text-decoration:line-through}
.field{margin-bottom:16px;animation:rise .5s both}.field label{display:block;font-size:12.5px;font-weight:600;margin-bottom:6px}.field label .opt{color:var(--ink-soft);font-weight:400}
.field input,.field textarea,select{width:100%;font-family:inherit;font-size:15px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 15px;color:var(--ink);transition:border .25s}
.field input:focus,.field textarea:focus,select:focus{outline:none;border-color:var(--gold)}.field textarea{resize:vertical;min-height:60px}.field.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.chips{display:flex;gap:9px;flex-wrap:wrap}
.chip{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:var(--card);font-family:inherit;font-size:13px;font-weight:600;padding:10px 15px;border-radius:100px;cursor:pointer;color:var(--ink);transition:all .2s}
.chip:hover{border-color:var(--gold)}.chip.sel{background:var(--navy);color:var(--paper);border-color:var(--navy)}
.recog{display:flex;align-items:center;gap:10px;background:var(--gold-bg);border:1px solid var(--gold-soft);border-radius:12px;padding:12px 14px;font-size:13px;margin-bottom:14px;animation:rise .4s both;flex-wrap:wrap}
.recog .pt{margin-left:auto;font-family:"Fraunces",serif;font-size:17px;color:var(--gold);white-space:nowrap}
.disc-badge{font-size:11px;font-weight:700;background:var(--rose);color:#fff;padding:3px 9px;border-radius:100px}
.summary{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:6px 18px;margin-bottom:18px}
.sum-row{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;padding:12px 0;border-bottom:1px solid var(--line);font-size:14px}
.sum-row:last-child{border-bottom:none}.sum-row .k{color:var(--ink-soft);font-size:12.5px;white-space:nowrap}.sum-row .v{font-weight:600;text-align:right}
.sum-list{font-weight:600;text-align:right;line-height:1.7}.sum-list .sub{font-weight:400;color:var(--ink-soft);font-size:12px}.sum-total .v{font-family:"Fraunces",serif;font-size:21px;color:var(--navy)}.sum-row .v.disc{color:var(--rose)}.sum-row .v.pt{color:var(--gold)}
.terms{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px;font-size:11.5px;color:var(--ink-soft);line-height:1.7;max-height:150px;overflow-y:auto;margin-bottom:12px}.terms b{color:var(--navy);display:block;margin-bottom:6px;font-size:12px}
.agree{display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13px;font-weight:600;margin-bottom:6px}
.agree .box{width:22px;height:22px;border-radius:7px;border:1.5px solid var(--line);display:grid;place-items:center;flex-shrink:0;transition:all .2s}
.agree.on .box{background:var(--navy);border-color:var(--navy)}.agree .box svg{width:13px;height:13px;stroke:#fff;stroke-width:3;opacity:0;transition:opacity .2s}.agree.on .box svg{opacity:1}
.cta-bar{position:sticky;bottom:0;background:linear-gradient(transparent,var(--paper) 30%);padding:18px 0 8px;margin-top:10px;display:flex;gap:10px;align-items:center}
.cart-mini{flex:1;font-size:13px}.cart-mini .ct-n{font-weight:600;color:var(--navy)}.cart-mini .ct-p{font-family:"Fraunces",serif;font-size:18px;color:var(--gold);margin-left:8px}
.done{text-align:center;padding:22px 8px 10px;animation:rise .6s both}
.done-check{width:74px;height:74px;border-radius:50%;background:var(--sage);margin:0 auto 20px;display:grid;place-items:center;animation:pop .5s .15s both}.done-check svg{width:34px;height:34px;stroke:var(--paper);stroke-width:2.5}
.done h2{font-family:"Fraunces",serif;font-size:26px;font-weight:500;color:var(--navy);margin-bottom:8px}.done p{color:var(--ink-soft);font-size:14px;line-height:1.7;margin-bottom:20px}
.code{display:inline-block;font-family:"Fraunces",serif;font-size:22px;letter-spacing:.12em;background:var(--card);border:1px dashed var(--gold);border-radius:12px;padding:12px 30px;margin-bottom:22px;color:var(--navy)}
.ptgain{background:var(--gold-bg);border:1px solid var(--gold-soft);border-radius:12px;padding:14px;margin-bottom:20px;font-size:13.5px;line-height:1.7}.ptgain b{font-family:"Fraunces",serif;font-size:18px;color:var(--gold)}

function gcalShiftUrl(sid,ds,sh){if(!sh.on||!sh.ranges.length)return '';const rs=sh.ranges;const st=Math.min(...rs.map(r=>r.start)),en=Math.max(...rs.map(r=>r.end));const start=new Date(ds+'T'+gpad(st)+':00:00');const end=new Date(ds+'T'+gpad(en)+':00:00');const f=d=>d.getFullYear()+gpad(d.getMonth()+1)+gpad(d.getDate())+'T'+gpad(d.getHours())+gpad(d.getMinutes())+'00';const text=encodeURIComponent('出勤：'+stById(sid).name);const det=encodeURIComponent('受付 '+rs.map(r=>r.start+':00〜'+r.end+':00').join('、'));return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${text}&dates=${f(start)}/${f(end)}&details=${det}&ctz=Asia/Tokyo`}
function shiftFor(sid,dow){return (DATA.shifts&&DATA.shifts[sid]&&DATA.shifts[sid][dow])||null}
function normalizeShift(sh){if(!sh)return{on:false,ranges:[]};if(sh.ranges)return{on:sh.on!==false,ranges:sh.ranges};if(sh.start!==undefined)return{on:sh.on!==false,ranges:[{start:sh.start,end:sh.end}]};return{on:sh.on!==false,ranges:[{start:9,end:21}]}}
function effectiveShift(sid,dateStr){const ov=(DATA.shiftOverrides&&DATA.shiftOverrides[sid]&&DATA.shiftOverrides[sid][dateStr]);if(ov){if(ov.off)return{on:false,ranges:[]};if(ov.ranges)return{on:true,ranges:ov.ranges};return{on:true,ranges:[{start:ov.start,end:ov.end}]};}return normalizeShift(shiftFor(sid,new Date(dateStr).getDay()))}
function staffWorks(sid,dateStr){const dow=new Date(dateStr).getDay();if(dow===CLOSED_DOW)return false;if(isDayOff(sid,dateStr))return false;const sh=effectiveShift(sid,dateStr);return !!(sh.on&&sh.ranges.length)}
function staffSlotOpen(sid,dateStr,hour){const sh=effectiveShift(sid,dateStr);if(!sh.on)return false;if(!sh.ranges.some(r=>hour>=r.start&&hour<=r.end))return false;const t=String(hour).padStart(2,'0')+':00';if(isBlocked(sid,dateStr,t))return false;return !DATA.bookings.some(b=>b.staffId===sid&&b.date===dateStr&&b.time===t&&b.status!=='cancelled')}
function _hoursOpts(h){let o='';for(let x=OPEN_HOUR;x<=LAST_RECEPTION;x++)o+=`<option value="${x}" ${x===h?'selected':''}>${x}:00</option>`;return o}
function _pk(key){const[scope,sid,k]=key.split('|');return{scope,sid,k}}
function shiftDisplay(scope,sid,k){if(scope==='w')return normalizeShift(shiftFor(sid,k));const ov=(DATA.shiftOverrides[sid]||{})[k];if(ov){if(ov.off)return{on:false,ranges:[]};if(ov.ranges)return{on:true,ranges:ov.ranges};return{on:true,ranges:[{start:ov.start,end:ov.end}]}}return effectiveShift(sid,k)}
function rangeRows(scope,sid,k){const key=`${scope}|${sid}|${k}`;const d=shiftDisplay(scope,sid,k);if(!d.on)return '';let rows=d.ranges.map((r,i)=>`<div class="rng"><select data-rng="${key}#${i}#start">${_hoursOpts(r.start)}</select><span>〜</span><select data-rng="${key}#${i}#end">${_hoursOpts(r.end)}</select>${d.ranges.length>1?`<button class="iconbtn" data-rngdel="${key}#${i}">×</button>`:''}</div>`).join('');if(d.ranges.length<3)rows+=`<button class="tbtn" data-rngadd="${key}">＋ 時間帯を追加</button>`;return rows}
function _matObj(scope,sid,k){if(scope==='w'){DATA.shifts[sid]=DATA.shifts[sid]||{};const o=normalizeShift(DATA.shifts[sid][k]);DATA.shifts[sid][k]=o;return o}DATA.shiftOverrides[sid]=DATA.shiftOverrides[sid]||{};const ov=DATA.shiftOverrides[sid][k];let o;if(!ov){const e=effectiveShift(sid,k);o={on:e.on,ranges:e.ranges.map(r=>({...r}))}}else if(ov.off){o={on:false,ranges:[]}}else if(ov.ranges){o=ov}else{o={on:true,ranges:[{start:ov.start,end:ov.end}]}}DATA.shiftOverrides[sid][k]=o;return o}

  return `<div class="post ${feat?'feat':''}"><div class="post-img" style="${bg}"><span class="post-kindtag">${catLabel(p.cat)}</span>${p.by==='customer'?'<span class="bytag">お客様の投稿</span>':''}<button class="post-save ${saved?'on':''}" data-save="${p.id}" aria-label="保存"><svg viewBox="0 0 24 24"><path d="M12 21s-7-4.5-9.4-8.6C.6 9.3 2.3 5.5 6 5.5c2.2 0 3.3 1.3 4 2.3.7-1 1.8-2.3 4-2.3 3.7 0 5.4 3.8 3.4 6.9C19 16.5 12 21 12 21z"/></svg></button></div>

function parseCSV(text){text=text.replace(/^\uFEFF/,'');const rows=[];let row=[],field='',inq=false;for(let i=0;i<text.length;i++){const ch=text[i];if(inq){if(ch==='"'){if(text[i+1]==='"'){field+='"';i++;}else inq=false;}else field+=ch;}else{if(ch==='"')inq=true;else if(ch===','){row.push(field);field='';}else if(ch==='\n'){row.push(field);rows.push(row);row=[];field='';}else if(ch==='\r'){}else field+=ch;}}if(field.length||row.length){row.push(field);rows.push(row);}const headers=(rows.shift()||[]).map(h=>(h||'').trim());return {headers,rows:rows.filter(r=>r.some(c=>c&&c.trim()))};}

let recog=null,recogTarget=null;
function startVoice(elId,btn){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert('この端末では音声認識が使えません。キーボードのマイク（音声入力）をご利用ください。');return;}
  if(recog){recog.stop();recog=null;btn.classList.remove('on');return;}
  recog=new SR();recog.lang='ja-JP';recog.interimResults=false;recog.continuous=true;recogTarget=elId;btn.classList.add('on');
  recog.onresult=e=>{let txt='';for(let i=e.resultIndex;i<e.results.length;i++)txt+=e.results[i][0].transcript;const el=byId(elId);if(el)el.value=(el.value?el.value+' ':'')+txt};
  recog.onend=()=>{btn.classList.remove('on');recog=null};recog.start();

async function saveMenu(){const name=byId('m-name').value.trim();if(!name){alert('メニュー名を入力してください。');return;}
  const cat=byId('m-cat').value;const price=parseInt(byId('m-price').value||'0')||0;const min=parseInt(byId('m-min').value||'0')||0;const desc=byId('m-desc').value.trim();const detail=byId('m-detail')?byId('m-detail').value.trim():'';
  const addons=[...document.querySelectorAll('[data-addon]')].filter(c=>c.checked).map(c=>c.dataset.addon);
  const existingSv=state.menuEdit!=='new'?svById(state.menuEdit):null;
  let photos=state.menuPhotos&&state.menuPhotos.filter(Boolean).length?state.menuPhotos.filter(Boolean).slice(0,3):(existingSv?(existingSv.photos&&existingSv.photos.length?existingSv.photos:(existingSv.img?[existingSv.img]:[])):[]);
  let id;
  const pairOk=byId('m-pair')?byId('m-pair').checked:true;const mensOk=byId('m-mens')?byId('m-mens').checked:false;
  if(state.menuEdit==='new'){id='m'+Date.now();DATA.services.push({id,cat,name,min,price,desc,detail,img:photos[0]||'',photos,addons,pair:pairOk,mens:mensOk});}
  else{id=existingSv.id;existingSv.cat=cat;existingSv.name=name;existingSv.price=price;existingSv.min=min;existingSv.desc=desc;existingSv.detail=detail;existingSv.addons=addons;existingSv.photos=photos;existingSv.img=photos[0]||existingSv.img||'';existingSv.pair=pairOk;existingSv.mens=mensOk;}
  // per-menu staff assignment
  const allIds=DATA.services.map(x=>x.id);
  staff.filter(s=>s.id!=='s0').forEach(st=>{const box=document.querySelector(`[data-mstaff="${st.id}"]`);if(!box)return;const checked=box.checked;const hasAll=!(st.services||[]).length;
    if(checked){if(!hasAll&&!st.services.includes(id))st.services.push(id);}
    else{if(hasAll){st.services=allIds.filter(x=>x!==id);}else{st.services=st.services.filter(x=>x!==id);}}});
  services=DATA.services;staff=DATA.staff;state.menuEdit=null;state.menuPhotos=[];await saveData(DATA);render();}
async function applyPriceUpdate(){
  const plan=[
    {ids:['le1'],cat:'lash',kw:['80本'],price:5500},
    {ids:['le2'],cat:'lash',kw:['100本'],price:6600},
    {ids:['le3'],cat:'lash',kw:['120本'],price:7700},
    {ids:['le4'],cat:'lash',kw:['140本'],price:8800},
    {ids:['le5'],cat:'lash',kw:['つけ放題','放題'],price:14900},
    {ids:['wl1'],cat:'wlash',kw:['60束'],price:6000},
    {ids:['wl2'],cat:'wlash',kw:['80束'],price:7900},
    {ids:['wl3'],cat:'wlash',kw:['100束'],price:9900},
    {ids:['wl4'],cat:'wlash',kw:['120束'],price:11900},
    {ids:['wl5'],cat:'wlash',kw:['つけ放題','放題','無制限'],price:15800}
  ];
  let done=[],miss=[];
  plan.forEach(p=>{let s=p.ids.map(id=>svById(id)).find(Boolean);if(!s)s=DATA.services.find(x=>x.cat===p.cat&&p.kw.some(k=>x.name.includes(k)));if(s){s.price=p.price;done.push(`${s.name}：${yen(p.price)}`);}else miss.push(p.kw[0]);});
  if(!confirm('まつげエクステ・Wエクステの価格を、お伝えいただいた最新価格に更新します。よろしいですか？\n\n'+done.join('\n')))return;
  await saveData(DATA);render();
  alert(`${done.length}件の価格を更新しました。`+(miss.length?`\n\n見つからなかった項目：${miss.join('、')}\nメニュー名が変わっている可能性があります。お手数ですが個別に修正してください。`:''));
}
async function moveMenu(id,dir){const arr=DATA.services;const idx=arr.findIndex(s=>s.id===id);if(idx<0)return;const cat=arr[idx].cat;let sw=-1;if(dir<0){for(let i=idx-1;i>=0;i--){if(arr[i].cat===cat){sw=i;break;}}}else{for(let i=idx+1;i<arr.length;i++){if(arr[i].cat===cat){sw=i;break;}}}if(sw<0)return;const tmp=arr[idx];arr[idx]=arr[sw];arr[sw]=tmp;services=DATA.services;await saveData(DATA);render();}

function dStartChange(sel){const ds=sel.dataset.dstart;const sid=state.schedStaff||'s1';const row=sel.closest('.mlrow');const end=row.querySelector('[data-dend]');DATA.shiftOverrides[sid]=DATA.shiftOverrides[sid]||{};
  if(sel.value==='off'){DATA.shiftOverrides[sid][ds]={off:true};if(end)end.disabled=true;row.classList.add('off');}
  else{let s=parseInt(sel.value),e=end?parseInt(end.value):s+1;if(s>=e){e=Math.min(LAST_RECEPTION,s+1);if(end)end.value=e;}if(end)end.disabled=false;DATA.shiftOverrides[sid][ds]={ranges:[{start:s,end:e}]};row.classList.remove('off');}
  saveSoon();}
function dEndChange(sel){const ds=sel.dataset.dend;const sid=state.schedStaff||'s1';const row=sel.closest('.mlrow');const start=row.querySelector('[data-dstart]');if(!start||start.value==='off')return;let s=parseInt(start.value),e=parseInt(sel.value);if(s>=e){s=Math.max(OPEN_HOUR,e-1);start.value=String(s);}DATA.shiftOverrides[sid]=DATA.shiftOverrides[sid]||{};DATA.shiftOverrides[sid][ds]={ranges:[{start:s,end:e}]};saveSoon();}
async function copyPrevMonth(){const sid=state.schedStaff||'s1';const m=state.scM,y=m.getFullYear(),mo=m.getMonth();const pm=new Date(y,mo-1,1),py=pm.getFullYear(),pmo=pm.getMonth();if(!confirm(`${stById(sid).name}さんの「${pmo+1}月」のシフトを、この「${mo+1}月」にコピーします（曜日をそろえてコピーします）。よろしいですか？このあと違う日だけ直せます。`))return;const prevDays=new Date(py,pmo+1,0).getDate();const occ={};for(let d=1;d<=prevDays;d++){const dd=new Date(py,pmo,d);const w=dd.getDay();(occ[w]=occ[w]||[]).push(fmtDate(dd));}const days=new Date(y,mo+1,0).getDate();DATA.shiftOverrides[sid]=DATA.shiftOverrides[sid]||{};const seen={};let cnt=0;for(let d=1;d<=days;d++){const dd=new Date(y,mo,d);const w=dd.getDay();if(w===CLOSED_DOW)continue;seen[w]=seen[w]||0;const srcDs=(occ[w]||[])[seen[w]];seen[w]++;if(!srcDs)continue;const src=effectiveShift(sid,srcDs);const ds=fmtDate(dd);if(!src.on||!src.ranges.length)DATA.shiftOverrides[sid][ds]={off:true};else DATA.shiftOverrides[sid][ds]={ranges:src.ranges.map(r=>({start:r.start,end:r.end}))};cnt++;}await saveData(DATA);render();alert(`先月のシフトを${cnt}日分コピーしました。違う日だけ直してください。`);}
async function qfFill(){const sid=state.schedStaff||'s1';const ss=byId('qf-s'),ee=byId('qf-e');let s=parseInt(ss.value),e=parseInt(ee.value);if(s>=e){alert('終了は開始より後の時刻にしてください。');return;}if(!confirm(`${stById(sid).name}さんの今月の全営業日（火曜以外）を ${gpad(s)}:00〜${gpad(e)}:00 の出勤にします。よろしいですか？（このあと違う日だけ直せます）`))return;const m=state.scM,y=m.getFullYear(),mo=m.getMonth(),days=new Date(y,mo+1,0).getDate();DATA.shiftOverrides[sid]=DATA.shiftOverrides[sid]||{};for(let d=1;d<=days;d++){const dd=new Date(y,mo,d);if(dd.getDay()===CLOSED_DOW)continue;DATA.shiftOverrides[sid][fmtDate(dd)]={ranges:[{start:s,end:e}]};}state.brushStart=s;state.brushEnd=e;await saveData(DATA);render();}
async function shiftDaySet(key,val){const[sid,ds,field]=key.split('|');const o=_matObj('m',sid,ds);if(!o.ranges||!o.ranges.length)o.ranges=[{start:9,end:21}];o.on=true;o.ranges[0][field]=parseInt(val);if(o.ranges[0].start>=o.ranges[0].end){if(field==='start')o.ranges[0].end=Math.min(LAST_RECEPTION,o.ranges[0].start+1);else o.ranges[0].start=Math.max(OPEN_HOUR,o.ranges[0].end-1);}await saveData(DATA);render();}
async function shiftBulkApply(off){const sid=state.schedStaff||'s1';const from=byId('blk-from').value,to=byId('blk-to').value;if(!from||!to){alert('開始日と終了日を選んでください。');return;}const s=parseInt(byId('blk-s').value),e=parseInt(byId('blk-e').value);if(!off&&s>=e){alert('受付の終了は開始より後の時刻にしてください。');return;}const[fy,fm,fd]=from.split('-').map(Number),[ty,tm,td]=to.split('-').map(Number);let d=new Date(fy,fm-1,fd);const end=new Date(ty,tm-1,td);if(d>end){alert('終了日は開始日と同じか後の日にしてください。');return;}DATA.shiftOverrides[sid]=DATA.shiftOverrides[sid]||{};let cnt=0;while(d<=end){if(d.getDay()!==CLOSED_DOW){const ds=fmtDate(d);DATA.shiftOverrides[sid][ds]=off?{off:true}:{ranges:[{start:s,end:e}]};cnt++;}d.setDate(d.getDate()+1);}await saveData(DATA);render();alert(`${stById(sid).name}さんの${cnt}日分を${off?'終日休み':gpad(s)+':00〜'+gpad(e)+':00 の出勤'}に設定しました。`);}
function buildMonthICS(){const m=state.scM,y=m.getFullYear(),mo=m.getMonth(),days=new Date(y,mo+1,0).getDate();const reals=staff.filter(s=>s.id!=='s0');let ics='BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Vi5//Shift//JP\r\nCALSCALE:GREGORIAN\r\n';const dt=(ds,h)=>ds.replace(/-/g,'')+'T'+gpad(h)+'0000';for(const s of reals){for(let dnum=1;dnum<=days;dnum++){const dd=new Date(y,mo,dnum);if(dd.getDay()===CLOSED_DOW)continue;const ds=fmtDate(dd);if(!staffWorks(s.id,ds))continue;const sh=effectiveShift(s.id,ds);if(!sh.on||!sh.ranges.length)continue;for(const r of sh.ranges){ics+='BEGIN:VEVENT\r\n'+`UID:${s.id}-${ds}-${r.start}@vi5\r\n`+`DTSTART:${dt(ds,r.start)}\r\n`+`DTEND:${dt(ds,r.end)}\r\n`+`SUMMARY:出勤 ${s.name}\r\n`+'END:VEVENT\r\n';}}}ics+='END:VCALENDAR\r\n';return ics;}
function downloadMonthICS(){const ics=buildMonthICS();const m=state.scM;const fname=`vi5-shift-${m.getFullYear()}-${gpad(m.getMonth()+1)}.ics`;try{const blob=new Blob([ics],{type:'text/calendar;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=fname;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1500);}catch(e){alert('書き出しに失敗しました。');}}
async function ovSet(kind){const sid=state.schedStaff,ds=state.calDay;if(!ds)return;DATA.shiftOverrides[sid]=DATA.shiftOverrides[sid]||{};
  if(kind==='normal'){delete DATA.shiftOverrides[sid][ds];}
  else if(kind==='off'){DATA.shiftOverrides[sid][ds]={off:true};}
  else{let st=parseInt(byId('cd-start').value),en=parseInt(byId('cd-end').value);if(st>=en)en=Math.min(LAST_RECEPTION,st+1);DATA.shiftOverrides[sid][ds]={start:st,end:en};}
  await saveData(DATA);render();}
async function toggleBlock(s){const[sid,time]=s.split('|');const i=DATA.blocks.findIndex(b=>b.staffId===sid&&b.date===state.schedDate&&b.time===time);if(i>=0)DATA.blocks.splice(i,1);else DATA.blocks.push({staffId:sid,date:state.schedDate,time});await saveData(DATA);render();}
async function toggleDayOff(sid){const i=DATA.blocks.findIndex(b=>b.staffId===sid&&b.date===state.schedDate&&!b.time);if(i>=0)DATA.blocks.splice(i,1);else DATA.blocks.push({staffId:sid,date:state.schedDate,time:''});await saveData(DATA);render();}
function handlePhoto(file,cb,maxv){const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>{const max=maxv||900;let w=img.width,h=img.height;if(w>max){h=h*max/w;w=max}const cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);cb(cv.toDataURL('image/jpeg',0.72))};img.src=e.target.result};r.readAsDataURL(file)}
async function addPost(){const cat=byId('po-cat').value;const cap=byId('po-cap').value.trim();const menu=byId('po-menu').value;const colors=['#3A4660','#9C7B4A','#5F7355','#9C5B6B','#4A6B6B','#6B6276'];
  DATA.posts.unshift({id:'p'+Date.now(),cat,img:state.pendingPhoto||'',color:colors[DATA.posts.length%colors.length],caption:cap,menuIds:menu?[menu]:[]});state.pendingPhoto='';await saveData(DATA);render();}
async function delPost(id){if(!confirm('この投稿を削除しますか？'))return;DATA.posts=DATA.posts.filter(p=>p.id!==id);await saveData(DATA);render();}
async function addCampaign(){const title=byId('cp-title').value.trim();const desc=byId('cp-desc').value.trim();if(!title){alert('タイトルを入力してください。');return;}DATA.campaigns.unshift({id:'c'+Date.now(),title,desc,active:true});await saveData(DATA);render();}
async function toggleCamp(id){const c=getCamp(id);if(c){c.active=!c.active;await saveData(DATA);render();}}
async function delCamp(id){if(!confirm('削除しますか？'))return;DATA.campaigns=DATA.campaigns.filter(c=>c.id!==id);await saveData(DATA);render();}
async function pushCampAll(id){const c=getCamp(id);if(!confirm('このお知らせを全顧客のマイページに配信しますか？'))return;Object.values(DATA.customers).forEach(cu=>pushNotice(cu,`【${c.title}】${c.desc}`));await saveData(DATA);alert('全顧客に配信しました。');}
async function addBanner(){const img=state.bannerPhoto||'';if(!img){alert('画像を選んでください。');return;}const link=byId('bn-link').value.trim();const from=byId('bn-from').value;const to=byId('bn-to').value;S().banners=S().banners||[];S().banners.unshift({id:'bn'+Date.now(),img,link,from,to,active:true});state.bannerPhoto='';await saveData(DATA);alert('バナーを追加しました。');render();}
async function saveSettings(){const s=S();s.lineUrl=byId('set-line').value.trim();s.mapUrl=byId('set-map').value.trim();s.shopUrl=byId('set-shop').value.trim();s.catalogUrl=byId('set-cat').value.trim();s.address=byId('set-addr').value.trim();s.hours=byId('set-hours').value.trim();s.birthdayMsg=byId('set-bday').value;const e=byId('set-email');if(e)s.staffEmail=e.value.trim();const p=byId('set-pw');if(p)s.staffPw=p.value;
  const pol=byId('set-policy');if(pol)s.bookingPolicy=pol.value;
  s.theme=s.theme||{};['navy','gold','sage','rose','paper'].forEach(k=>{const el=byId('th-'+k);if(el)s.theme[k]=el.value});if(state.heroPending){s.theme.heroImg=state.heroPending;state.heroPending=''}
  s.texts=s.texts||{};['tagline','heroTitle','heroSub','homeNote'].forEach(k=>{const el=byId('tx-'+k);if(el)s.texts[k]=el.value});
  await saveData(DATA);applyTheme();alert('保存しました。');render();}
function exportCSV(){
  const head=['予約ID','日付','時間','お名前','電話番号','メニュー','担当','割引','クーポン','利用pt','支払額','同伴','急ぎ','同行者','ステータス','一言','顧客メモ'];
  const rows=DATA.bookings.map(b=>{const c=DATA.customers[normPhone(b.phone)];return [b.id,b.date,b.time,c?c.name:'',b.phone,b.items.map(x=>x.name).join(' / '),stById(b.staffId).name,b.discountRate?Math.round(b.discountRate*100)+'%':'',b.couponUsed||0,b.pointsUsed,bkPayment(b),b.companions.join(' '),b.haste==='hurry'?'急ぎ':'',b.party&&b.party.length?b.party[0].name:'',b.status,b.salonMessage||'',b.customerMemo||'']});
  const esc=v=>'"'+String(v).replace(/"/g,'""')+'"';const csv='\uFEFF'+[head,...rows].map(r=>r.map(esc).join(',')).join('\r\n');const blob=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='vi5_予約一覧.csv';a.click();
}
